kind = "web"
previewPath = "/"
title = "AffiTrack"
version = "1.0.0"
id = "artifacts/affitrack"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19041

[services.development]
run = "pnpm --filter @workspace/affitrack run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/affitrack", "run", "build" ]
publicDir = "artifacts/affitrack/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19041"
BASE_PATH = "/"
