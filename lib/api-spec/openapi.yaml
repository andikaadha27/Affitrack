openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: AffiTrack - Affiliate Business Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: dashboard
    description: Dashboard analytics
  - name: revenues
    description: Revenue management
  - name: ads
    description: Ads management
  - name: expenses
    description: Expense management
  - name: employees
    description: Employee management
  - name: schedules
    description: Schedule management
  - name: attendance
    description: Attendance tracking
  - name: salaries
    description: Salary calculation
  - name: activity
    description: Recent activity feed

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # DASHBOARD
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary for today (or a specific date) and this month
      parameters:
        - name: date
          in: query
          schema:
            type: string
          description: "Date in YYYY-MM-DD format (defaults to today)"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/trends:
    get:
      operationId: getDashboardTrends
      tags: [dashboard]
      summary: Get revenue/ads/profit trend data
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [7d, 30d, month]
          description: Time period for trend data
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrendPoint"

  # REVENUES
  /revenues:
    get:
      operationId: listRevenues
      tags: [revenues]
      summary: List revenues
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueList"
    post:
      operationId: createRevenue
      tags: [revenues]
      summary: Create a revenue entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevenueInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Revenue"

  /revenues/{id}:
    get:
      operationId: getRevenue
      tags: [revenues]
      summary: Get a revenue entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Revenue"
    patch:
      operationId: updateRevenue
      tags: [revenues]
      summary: Update a revenue entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevenueUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Revenue"
    delete:
      operationId: deleteRevenue
      tags: [revenues]
      summary: Delete a revenue entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ADS
  /ads:
    get:
      operationId: listAds
      tags: [ads]
      summary: List ads
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdList"
    post:
      operationId: createAd
      tags: [ads]
      summary: Create an ad entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ad"

  /ads/{id}:
    patch:
      operationId: updateAd
      tags: [ads]
      summary: Update an ad entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ad"
    delete:
      operationId: deleteAd
      tags: [ads]
      summary: Delete an ad entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # EXPENSES
  /expenses:
    get:
      operationId: listExpenses
      tags: [expenses]
      summary: List expenses
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseList"
    post:
      operationId: createExpense
      tags: [expenses]
      summary: Create an expense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"

  /expenses/{id}:
    patch:
      operationId: updateExpense
      tags: [expenses]
      summary: Update an expense
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
    delete:
      operationId: deleteExpense
      tags: [expenses]
      summary: Delete an expense
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # EMPLOYEES
  /employees:
    get:
      operationId: listEmployees
      tags: [employees]
      summary: List employees
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: active
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeList"
    post:
      operationId: createEmployee
      tags: [employees]
      summary: Create an employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /employees/{id}:
    get:
      operationId: getEmployee
      tags: [employees]
      summary: Get an employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
    patch:
      operationId: updateEmployee
      tags: [employees]
      summary: Update an employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
    delete:
      operationId: deleteEmployee
      tags: [employees]
      summary: Delete an employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # SCHEDULES
  /schedules:
    get:
      operationId: listSchedules
      tags: [schedules]
      summary: List schedules
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
        - name: employeeId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Schedule"
    post:
      operationId: createSchedule
      tags: [schedules]
      summary: Create a schedule entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"

  /schedules/{id}:
    patch:
      operationId: updateSchedule
      tags: [schedules]
      summary: Update a schedule entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"
    delete:
      operationId: deleteSchedule
      tags: [schedules]
      summary: Delete a schedule entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ATTENDANCE
  /attendance:
    get:
      operationId: listAttendance
      tags: [attendance]
      summary: List attendance records
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
        - name: employeeId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceList"
    post:
      operationId: markAttendance
      tags: [attendance]
      summary: Mark attendance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attendance"

  /attendance/bulk:
    post:
      operationId: bulkMarkAttendance
      tags: [attendance]
      summary: Bulk mark attendance as present
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkAttendanceInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkAttendanceResult"

  /attendance/{id}:
    patch:
      operationId: updateAttendance
      tags: [attendance]
      summary: Update an attendance record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attendance"

  # SALARIES
  /salaries:
    get:
      operationId: listSalaries
      tags: [salaries]
      summary: List salary records
      parameters:
        - name: month
          in: query
          schema:
            type: integer
        - name: year
          in: query
          schema:
            type: integer
        - name: employeeId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Salary"

  /salaries/calculate:
    post:
      operationId: calculateSalaries
      tags: [salaries]
      summary: Calculate salaries for a given month
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SalaryCalculateInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Salary"

  # ACTIVITY
  /activity:
    get:
      operationId: listActivity
      tags: [activity]
      summary: Get recent activity feed
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # AUTH
    RegisterInput:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [admin, user]

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, name, email, role]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, user]
        createdAt:
          type: string

    # DASHBOARD
    DashboardSummary:
      type: object
      required: [todayRevenue, todayActualRevenue, todayAds, todayAdsWithFee, todaySalary, todayProfit, monthRevenue, monthProfit, monthSalary, monthExpenses, profitMargin, growthRate]
      properties:
        todayRevenue:
          type: number
        todayActualRevenue:
          type: number
        todayAds:
          type: number
        todayAdsWithFee:
          type: number
        todaySalary:
          type: number
        todayProfit:
          type: number
        monthRevenue:
          type: number
        monthActualRevenue:
          type: number
        monthProfit:
          type: number
        monthSalary:
          type: number
        monthExpenses:
          type: number
        profitMargin:
          type: number
        growthRate:
          type: number

    TrendPoint:
      type: object
      required: [date, revenue, ads, profit]
      properties:
        date:
          type: string
        revenue:
          type: number
        actualRevenue:
          type: number
        ads:
          type: number
        profit:
          type: number

    # REVENUES
    Revenue:
      type: object
      required: [id, date, amount, product, createdAt]
      properties:
        id:
          type: integer
        date:
          type: string
        amount:
          type: number
        actualAmount:
          type: ["number", "null"]
        product:
          type: string
        units:
          type: ["integer", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    RevenueInput:
      type: object
      required: [date, amount, product]
      properties:
        date:
          type: string
        amount:
          type: number
        actualAmount:
          type: ["number", "null"]
        product:
          type: string
        units:
          type: ["integer", "null"]
        notes:
          type: ["string", "null"]

    RevenueUpdate:
      type: object
      properties:
        date:
          type: string
        amount:
          type: number
        actualAmount:
          type: ["number", "null"]
        product:
          type: string
        units:
          type: ["integer", "null"]
        notes:
          type: ["string", "null"]

    RevenueList:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Revenue"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    # ADS
    Ad:
      type: object
      required: [id, date, amount, fee, totalWithFee, platform, createdAt]
      properties:
        id:
          type: integer
        date:
          type: string
        amount:
          type: number
        fee:
          type: number
        totalWithFee:
          type: number
        platform:
          type: string
          enum: [Shopee, TikTok, Meta, Google, Other]
        campaign:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    AdInput:
      type: object
      required: [date, amount, platform]
      properties:
        date:
          type: string
        amount:
          type: number
        platform:
          type: string
          enum: [Shopee, TikTok, Meta, Google, Other]
        campaign:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    AdUpdate:
      type: object
      properties:
        date:
          type: string
        amount:
          type: number
        platform:
          type: string
          enum: [Shopee, TikTok, Meta, Google, Other]
        campaign:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    AdList:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Ad"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    # EXPENSES
    Expense:
      type: object
      required: [id, category, amount, date, createdAt]
      properties:
        id:
          type: integer
        category:
          type: string
        amount:
          type: number
        date:
          type: string
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    ExpenseInput:
      type: object
      required: [category, amount, date]
      properties:
        category:
          type: string
        amount:
          type: number
        date:
          type: string
        notes:
          type: ["string", "null"]

    ExpenseUpdate:
      type: object
      properties:
        category:
          type: string
        amount:
          type: number
        date:
          type: string
        notes:
          type: ["string", "null"]

    ExpenseList:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Expense"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    # EMPLOYEES
    Employee:
      type: object
      required: [id, name, role, salaryType, salaryAmount, isActive, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          type: string
        phone:
          type: ["string", "null"]
        salaryType:
          type: string
          enum: [daily, monthly]
        salaryAmount:
          type: number
        isActive:
          type: boolean
        createdAt:
          type: string

    EmployeeInput:
      type: object
      required: [name, role, salaryType, salaryAmount]
      properties:
        name:
          type: string
        role:
          type: string
        phone:
          type: ["string", "null"]
        salaryType:
          type: string
          enum: [daily, monthly]
        salaryAmount:
          type: number
        isActive:
          type: boolean

    EmployeeUpdate:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
        phone:
          type: ["string", "null"]
        salaryType:
          type: string
          enum: [daily, monthly]
        salaryAmount:
          type: number
        isActive:
          type: boolean

    EmployeeList:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Employee"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    # SCHEDULES
    Schedule:
      type: object
      required: [id, employeeId, date, shift, createdAt]
      properties:
        id:
          type: integer
        employeeId:
          type: integer
        employee:
          $ref: "#/components/schemas/Employee"
        date:
          type: string
        shift:
          type: string
          enum: [morning, afternoon, evening, full]
        createdAt:
          type: string

    ScheduleInput:
      type: object
      required: [employeeId, date, shift]
      properties:
        employeeId:
          type: integer
        date:
          type: string
        shift:
          type: string
          enum: [morning, afternoon, evening, full]

    ScheduleUpdate:
      type: object
      properties:
        shift:
          type: string
          enum: [morning, afternoon, evening, full]

    # ATTENDANCE
    Attendance:
      type: object
      required: [id, employeeId, date, status, createdAt]
      properties:
        id:
          type: integer
        employeeId:
          type: integer
        employee:
          $ref: "#/components/schemas/Employee"
        date:
          type: string
        status:
          type: string
          enum: [present, absent, leave]
        createdAt:
          type: string

    AttendanceInput:
      type: object
      required: [employeeId, date, status]
      properties:
        employeeId:
          type: integer
        date:
          type: string
        status:
          type: string
